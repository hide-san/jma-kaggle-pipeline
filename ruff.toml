line-length = 120
target-version = "py311"

[lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line too long — not enforced
]

[lint.per-file-ignores]
"config.py" = ["E402"]                        # intentional: must import after env setup
"scripts/jma_datasets_overview.py" = ["F401"] # config imported for side-effect (registry)
