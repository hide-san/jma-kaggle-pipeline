name: Publish JMA Datasets Overview Notebook

on:
  schedule:
    # Every Sunday at 02:00 UTC (after datasets have been updated)
    - cron: "0 2 * * 0"
  workflow_dispatch:  # allow manual runs
  push:
    paths:
      - scripts/jma_datasets_overview.py  # re-publish when notebook script changes

jobs:
  publish-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/python-setup

      - name: Publish notebook to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: python scripts/jma_datasets_overview.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: notebook-publish-logs
          path: logs/pipeline.log
          retention-days: 7

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Notebook publish failed: ${new Date().toISOString().slice(0, 10)}`,
              body: `Publishing the JMA Datasets Overview notebook to Kaggle failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['pipeline-failure'],
            });
