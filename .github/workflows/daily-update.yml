name: Hourly JMA Data Pipeline

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:  # allow manual runs

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/python-setup

      - name: Fetch JMA Atom feeds
        run: python scripts/data_pipeline.py --fetch-feeds-only

      - name: Upload feed cache
        uses: actions/upload-artifact@v4
        with:
          name: jma-feeds
          path: data/raw/
          retention-days: 1

  update-datasets:
    needs: fetch-feeds
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Earthquakes & Seismic
            datasets: "jma-earthquake-activity-status,jma-hypocenter-and-seismic-intensity,jma-earthquake-early-warning,jma-seismic-intensity-flash-report,jma-seismic-observation-information,jma-earthquake-and-tsunami-notice"
          - name: Volcanoes & Eruptions
            datasets: "jma-eruption-flash-report,jma-volcanic-eruption-observation-report,jma-eruption-warning-and-forecast,jma-estimated-plume-direction-report,jma-volcanic-ash-forecast,jma-volcanic-situation-explanation,jma-volcano-notice"
          - name: Tsunamis & Marine
            datasets: "jma-tsunami-information,jma-tsunami-warning-advisory-forecast,jma-general-marine-warning,jma-regional-tidal-information,jma-general-tidal-information"
          - name: Weather & Hazards
            datasets: "jma-weather-warning-and-advisory,jma-record-short-time-heavy-rain,jma-tornado-watch-information,jma-special-weather-report,jma-designated-river-flood-forecast,jma-landslide-warning-information"
          - name: Forecasts & Observations
            datasets: "jma-general-typhoon-information,jma-general-typhoon-information-standardized,jma-general-typhoon-information-detailed,jma-general-seasonal-forecast,jma-regional-seasonal-forecast,jma-phenological-observations,jma-regional-sea-warning,jma-regional-sea-forecast,jma-seasonal-observation"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/python-setup

      - name: Download feed cache
        uses: actions/download-artifact@v4
        with:
          name: jma-feeds
          path: data/raw/

      - name: Run pipeline - ${{ matrix.name }}
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          DATASETS_FILTER: ${{ matrix.datasets }}
        run: python scripts/data_pipeline.py --skip-feed-fetch

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ matrix.name }}
          path: logs/pipeline.log
          retention-days: 7

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failed - ${{ matrix.name }}: ${new Date().toISOString().slice(0, 10)}`,
              body: `The JMA data pipeline failed for ${{ matrix.name }}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['pipeline-failure'],
            });
