name: Hourly JMA Data Pipeline

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:  # allow manual runs

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/python-setup

      - name: Fetch JMA Atom feeds
        run: python data_pipeline.py --fetch-feeds-only

      - name: Upload feed cache
        uses: actions/upload-artifact@v4
        with:
          name: jma-feeds
          path: data/raw/
          retention-days: 1

  update-datasets:
    needs: fetch-feeds
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Earthquakes & Seismic
            datasets: "japan-earthquake-activity-information,japan-earthquake-and-seismic-information,japan-earthquake-early-warning,japan-seismic-intensity-report,japan-seismic-observation-information,japan-earthquake-tsunami-notice"
          - name: Volcanoes & Eruptions
            datasets: "japan-eruption-flash-report,japan-eruption-observation,japan-eruption-warning,japan-estimated-plume-direction,japan-volcanic-ash-forecast,japan-volcano-status-explanation,japan-volcano-notice"
          - name: Tsunamis & Marine
            datasets: "japan-tsunami-information,japan-tsunami-warning,japan-general-marine-warning,japan-regional-tidal-information,japan-general-tidal-information"
          - name: Weather & Hazards
            datasets: "japan-weather-warning,japan-heavy-rain-warning,japan-tornado-watch,japan-special-weather-report,japan-river-flood-forecast,japan-landslide-hazard-alert"
          - name: Forecasts & Observations
            datasets: "japan-typhoon-information,japan-typhoon-information-standardized,japan-typhoon-information-detailed,japan-general-seasonal-forecast,japan-regional-seasonal-forecast,japan-phenological-observation,japan-regional-sea-alert,japan-regional-sea-forecast,japan-seasonal-observation"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/python-setup

      - name: Download feed cache
        uses: actions/download-artifact@v4
        with:
          name: jma-feeds
          path: data/raw/

      - name: Run pipeline - ${{ matrix.name }}
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          DATASETS_FILTER: ${{ matrix.datasets }}
        run: python data_pipeline.py --skip-feed-fetch

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ matrix.name }}
          path: logs/pipeline.log
          retention-days: 7

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failed - ${{ matrix.name }}: ${new Date().toISOString().slice(0, 10)}`,
              body: `The JMA data pipeline failed for ${{ matrix.name }}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['pipeline-failure'],
            });
